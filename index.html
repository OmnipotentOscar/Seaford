<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="theme-color" content="#020617" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<title>Seaford</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌊%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #020617;
    --card: #0f172a;
    --border: #1e293b;
    --text: #f1f5f9;
    --muted: #64748b;
    --dim: #94a3b8;
    --accent: #38bdf8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  .wrap { max-width: 440px; margin: 0 auto; padding: 20px 16px 32px; }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
  h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .refresh { background: none; border: none; color: var(--dim); padding: 8px; cursor: pointer; }
  .refresh:active { transform: scale(0.92); }
  .refresh.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

/* Location picker */
.loc-picker { position: relative; flex: 1; }
.loc-btn { display: flex; align-items: center; gap: 10px; background: none;
border: none; padding: 0; cursor: pointer; color: var(–text); text-align: left; }
.loc-btn:active { opacity: 0.7; }
.loc-icon { width: 36px; height: 36px; border-radius: 50%;
background: rgba(15,23,42,0.8); border: 1px solid var(–border);
display: flex; align-items: center; justify-content: center;
color: var(–accent); flex: 0 0 auto; }
.loc-info { flex: 1; min-width: 0; }
.loc-info h1 { display: flex; align-items: center; gap: 6px; }
.loc-info h1 .chev { color: var(–dim); display: inline-flex; transition: transform 0.2s; }
.loc-picker.open .chev { transform: rotate(180deg); }
.loc-menu { position: absolute; top: calc(100% + 8px); left: 0; right: 0;
background: #1e293b; border: 1px solid #334155; border-radius: 14px;
padding: 6px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
opacity: 0; pointer-events: none; transform: translateY(-6px); transition: all 0.15s; }
.loc-picker.open .loc-menu { opacity: 1; pointer-events: auto; transform: translateY(0); }
.loc-item { display: flex; align-items: center; gap: 12px; padding: 10px;
border-radius: 10px; cursor: pointer; color: var(–text); }
.loc-item:active { background: rgba(56,189,248,0.15); }
.loc-item.active { background: rgba(56,189,248,0.1); }
.loc-item .loc-icon { background: rgba(2,6,23,0.5); }
.loc-item .name { font-weight: 500; }
.loc-item .reg { font-size: 11px; color: var(–muted); margin-top: 2px; }
.card { background: rgba(15,23,42,0.8); border: 1px solid var(–border);
border-radius: 18px; padding: 18px; margin-bottom: 14px; }
.label { display: flex; align-items: center; gap: 8px; font-size: 11px;
text-transform: uppercase; letter-spacing: 0.08em; color: var(–dim); margin-bottom: 12px; }
.label .right { margin-left: auto; text-transform: none; letter-spacing: normal; color: var(–muted); }
.row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
.big { font-size: 40px; font-weight: 300; font-variant-numeric: tabular-nums; line-height: 1; }
.big .unit { font-size: 16px; color: var(–muted); margin-left: 4px; }
.caption { font-size: 11px; color: var(–muted); margin-top: 4px; }
.right-block { text-align: right; }
.right-block .title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(–dim); }
.right-block .val { font-size: 18px; font-weight: 500; font-variant-numeric: tabular-nums; margin-top: 2px; }
.right-block .time { font-size: 11px; color: var(–dim); font-variant-numeric: tabular-nums; }
.tide-chart { width: 100%; height: 140px; margin-top: 4px; }
.extremes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
margin-top: 12px; padding-top: 12px; border-top: 1px solid var(–border); }
.extremes .block .title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(–dim); }
.extremes .block .val { font-size: 13px; font-variant-numeric: tabular-nums; margin-top: 2px; }
.extremes .block.right { text-align: right; }
.weather-row { display: flex; align-items: center; gap: 16px; }
.icon-big { flex: 0 0 auto; }
.score-wrap { flex: 1; }
.score { font-size: 52px; font-weight: 300; font-variant-numeric: tabular-nums; line-height: 1; }
.score-sub { font-size: 13px; color: var(–muted); margin-top: 4px; font-variant-numeric: tabular-nums; }
.score-slash { font-size: 14px; color: var(–muted); }
.score-bar { height: 6px; background: var(–border); border-radius: 3px; overflow: hidden; margin-top: 16px; }
.score-bar > div { height: 100%; border-radius: 3px; transition: width 0.5s, background 0.5s; }
.score-legend { display: flex; justify-content: space-between; font-size: 10px; color: var(–muted); margin-top: 4px; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
margin-top: 14px; padding-top: 14px; border-top: 1px solid var(–border); }
.meta { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(–dim); }
.meta .val { color: var(–text); font-variant-numeric: tabular-nums; }
.meta svg { flex: 0 0 auto; }
.meta-title { font-size: 10px; color: var(–muted); text-transform: uppercase; letter-spacing: 0.08em; }

/* Sun bar */
.sun-bar { position: relative; height: 24px; margin-top: 4px; }
.sun-track { position: absolute; left: 0; right: 0; top: 10px; height: 4px;
background: var(–border); border-radius: 2px; overflow: visible; }
.sun-daylight { position: absolute; top: 0; bottom: 0;
background: linear-gradient(90deg, #f59e0b, #fbbf24, #fcd34d, #fbbf24, #f59e0b); border-radius: 2px; }
.sun-dot { position: absolute; top: -6px; width: 16px; height: 16px; border-radius: 50%;
background: #fef3c7; box-shadow: 0 0 12px rgba(251,191,36,0.9); transform: translateX(-50%); }
.sun-times { display: flex; justify-content: space-between; font-size: 10px;
color: var(–muted); margin-top: 8px; font-variant-numeric: tabular-nums; }
.sun-times .mid { color: var(–dim); }

/* Verdict */
.verdict-row { display: flex; align-items: center; gap: 14px; }
.verdict-icon { width: 52px; height: 52px; border-radius: 50%;
display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.verdict-text { flex: 1; }
.verdict-main { font-size: 20px; font-weight: 500; line-height: 1.1; }
.verdict-sub { font-size: 12px; color: var(–muted); margin-top: 4px; }

/* Compass */
.compass { width: 40px; height: 40px; position: relative; flex: 0 0 auto; }
.compass-ring { position: absolute; inset: 0; border-radius: 50%;
border: 1.5px solid var(–border); }
.compass-n { position: absolute; top: 1px; left: 50%; transform: translateX(-50%);
font-size: 7px; color: var(–muted); font-weight: 600; }
.compass-arrow { position: absolute; inset: 0; display: flex;
align-items: center; justify-content: center; transition: transform 0.5s; }

/* Barometer chart */
.baro-chart { width: 100%; height: 48px; }

/* Stargazing */
.stars-row { display: flex; align-items: center; gap: 16px; }
.moon-viz { flex: 0 0 auto; }
.stars-meta { font-size: 11px; color: var(–muted); margin-top: 2px; }

/* Pollen */
.pollen-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.pollen { background: rgba(2,6,23,0.6); border: 1px solid var(–border); border-radius: 12px; padding: 10px; }
.pollen .p-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(–muted); }
.pollen .p-val { font-size: 13px; font-weight: 500; margin-top: 4px; }
.pollen .bars { display: flex; gap: 2px; margin-top: 8px; }
.pollen .bars span { flex: 1; height: 4px; border-radius: 2px; background: var(–border); }

.footnote { font-size: 10px; color: var(–muted); text-align: center;
margin-top: 14px; line-height: 1.5; }
.error { padding: 24px; text-align: center; color: #fca5a5; }
.error button { margin-top: 12px; background: var(–card); color: var(–text);
border: 1px solid var(–border); padding: 8px 16px; border-radius: 8px; cursor: pointer; }
.loading { padding: 60px 0; text-align: center; color: var(–muted); font-size: 14px; }
.loading svg { animation: spin 1s linear infinite; vertical-align: -4px; margin-right: 8px; }
</style>

// --- Helpers --------------------------------------------------------------
function weatherIconName(code) {
  if (code === 0 || code === 1) return "sun";
  if (code === 2 || code === 3) return "cloud";
  if (code === 45 || code === 48) return "fog";
  if (code >= 51 && code <= 57) return "drizzle";
  if ((code >= 61 && code <= 67) || (code >= 80 && code <= 82)) return "rain";
  if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86)) return "snow";
  if (code >= 95) return "storm";
  return "cloud";
}

function weatherDescription(code) {
  const map = {
    0: "Clear", 1: "Mainly clear", 2: "Partly cloudy", 3: "Overcast",
    45: "Fog", 48: "Rime fog",
    51: "Light drizzle", 53: "Drizzle", 55: "Heavy drizzle",
    56: "Freezing drizzle", 57: "Freezing drizzle",
    61: "Light rain", 63: "Rain", 65: "Heavy rain",
    66: "Freezing rain", 67: "Freezing rain",
    71: "Light snow", 73: "Snow", 75: "Heavy snow", 77: "Snow grains",
    80: "Rain showers", 81: "Rain showers", 82: "Heavy showers",
    85: "Snow showers", 86: "Snow showers",
    95: "Thunderstorm", 96: "Thunderstorm + hail", 99: "Thunderstorm + hail"
  };
  return map[code] || "Mixed";
}

function weatherScore({ cloudCover, precip, windKmh }) {
  const cloudPts = 4 * (1 - cloudCover / 100);
  const precipPts = precip <= 0 ? 3 : precip < 0.2 ? 2 : precip < 1 ? 1 : 0;
  const windPts = windKmh < 10 ? 3 : windKmh < 20 ? 2 : windKmh < 30 ? 1 : 0;
  return Math.max(1, Math.min(10, Math.round(cloudPts + precipPts + windPts)));
}

function scoreColor(s) {
  const colors = ["#ef4444","#f97316","#f97316","#f59e0b","#eab308","#84cc16","#65a30d","#22c55e","#16a34a","#10b981"];
  return colors[Math.max(0, Math.min(9, s - 1))];
}

function findExtremes(series) {
  const out = [];
  for (let i = 1; i < series.length - 1; i++) {
    const p = series[i-1].h, c = series[i].h, n = series[i+1].h;
    if (c > p && c > n) out.push({ ...series[i], type: "high" });
    else if (c < p && c < n) out.push({ ...series[i], type: "low" });
  }
  return out;
}

function fmtCountdown(ms) {
  if (ms < 0) ms = 0;
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60), m = totalMin % 60;
  return h === 0 ? `${m}m` : `${h}h ${String(m).padStart(2,"0")}m`;
}

function fmtTime(d) {
  return d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hour12: false });
}

function pollenLevel(g) {
  if (g == null) return { label: "N/A", color: "#9ca3af", score: 0 };
  if (g < 30) return { label: "Low", color: "#10b981", score: 1 };
  if (g < 50) return { label: "Moderate", color: "#eab308", score: 2 };
  if (g < 150) return { label: "High", color: "#f97316", score: 3 };
  return { label: "Very High", color: "#ef4444", score: 4 };
}

function compassDir(deg) {
  if (deg == null) return "—";
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(((deg % 360) / 22.5)) % 16];
}

function boatDayVerdict({ waveHeight, windKmh, gustKmh, precip }) {
  const reasons = [];
  if (waveHeight != null && waveHeight > FLAT_SEA_M) reasons.push(`waves ${waveHeight.toFixed(2)}m`);
  if (windKmh > 25) reasons.push(`wind ${Math.round(windKmh)} km/h`);
  if (gustKmh != null && gustKmh > 40) reasons.push(`gusts ${Math.round(gustKmh)} km/h`);
  if (precip > 1) reasons.push("rain");

  if (reasons.length === 0) {
    return {
      verdict: "Good boat day",
      sub: waveHeight != null ? `Flat sea · ${waveHeight.toFixed(2)}m waves` : "Conditions look calm",
      color: "#10b981", icon: "check"
    };
  }
  if (reasons.length === 1 && waveHeight != null && waveHeight < 1 && windKmh < 30) {
    return { verdict: "Borderline", sub: "Manageable: " + reasons.join(", "), color: "#eab308", icon: "warn" };
  }
  return { verdict: "Not today", sub: reasons.join(" · "), color: "#ef4444", icon: "x" };
}

function horseDayVerdict({ windKmh, gustKmh, precip, tempC }) {
  const reasons = [];
  if (windKmh > 30) reasons.push(`wind ${Math.round(windKmh)} km/h`);
  if (gustKmh != null && gustKmh > 45) reasons.push(`gusts ${Math.round(gustKmh)} km/h`);
  if (precip > 2) reasons.push("heavy rain");
  else if (precip > 0.5) reasons.push("rain");
  if (tempC != null && tempC < 0) reasons.push("freezing");
  if (tempC != null && tempC > 28) reasons.push("too hot");

  if (reasons.length === 0) {
    return {
      verdict: "Good riding day",
      sub: "Dry and comfortable",
      color: "#10b981", icon: "check"
    };
  }
  if (reasons.length === 1 && windKmh < 40 && precip < 2) {
    return { verdict: "Borderline", sub: "Manageable: " + reasons.join(", "), color: "#eab308", icon: "warn" };
  }
  return { verdict: "Not today", sub: reasons.join(" · "), color: "#ef4444", icon: "x" };
}

function pressureTrend(history) {
  if (!history || history.length < 2) return { label: "Steady", color: "var(--dim)", symbol: "→" };
  const diff = history[history.length - 1] - history[0];
  if (diff > 1.5) return { label: "Rising", color: "#10b981", symbol: "↑" };
  if (diff < -1.5) return { label: "Falling", color: "#f97316", symbol: "↓" };
  return { label: "Steady", color: "var(--dim)", symbol: "→" };
}

// Moon phase: 0 = new, 0.25 = first quarter, 0.5 = full, 0.75 = last quarter
function moonPhase(date) {
  // Reference new moon: 2000-01-06 18:14 UTC
  const synodic = 29.530588853;
  const ref = Date.UTC(2000, 0, 6, 18, 14) / 1000;
  const now = date.getTime() / 1000;
  const daysSince = (now - ref) / 86400;
  let phase = (daysSince / synodic) % 1;
  if (phase < 0) phase += 1;
  return phase;
}

function moonPhaseName(p) {
  if (p < 0.03 || p > 0.97) return "New moon";
  if (p < 0.22) return "Waxing crescent";
  if (p < 0.28) return "First quarter";
  if (p < 0.47) return "Waxing gibbous";
  if (p < 0.53) return "Full moon";
  if (p < 0.72) return "Waning gibbous";
  if (p < 0.78) return "Last quarter";
  return "Waning crescent";
}

function moonIllumination(p) {
  // Fraction lit (0..1), peaks at 1 during full moon
  return (1 - Math.cos(2 * Math.PI * p)) / 2;
}

// Is it currently "night" (sun well below horizon)
function isNight(now, sunrise, sunset) {
  // Astronomical night starts ~30 min after sunset, ends ~30 min before sunrise
  const buf = 30 * 60 * 1000;
  if (now >= new Date(sunset.getTime() + buf)) return true;
  if (now <= new Date(sunrise.getTime() - buf)) return true;
  return false;
}

function starScore({ cloudCover, moonIllum, precip }) {
  // 10 = clear skies, new moon, dry; 1 = overcast, full moon, wet
  // Cloud is the biggest factor by far
  const cloudPts = 6 * (1 - cloudCover / 100); // 0..6
  const moonPts = 3 * (1 - moonIllum); // 0..3 (darker moon = better)
  const precipPts = precip <= 0 ? 1 : 0; // 0..1
  return Math.max(1, Math.min(10, Math.round(cloudPts + moonPts + precipPts)));
}

// --- Data fetching --------------------------------------------------------
function fetchJSON(url, timeoutMs = 10000) {
  return Promise.race([
    fetch(url).then(r => r.ok ? r.json() : Promise.reject(new Error("HTTP " + r.status))),
    new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), timeoutMs))
  ]);
}

async function loadAll(loc) {
  // Fetch each source independently. If pollen fails, weather still loads.
  const weatherP = fetchJSON(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation,cloud_cover,pressure_msl,relative_humidity_2m&hourly=pressure_msl&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code,sunrise,sunset,wind_speed_10m_max&timezone=Europe/London&forecast_days=1&past_hours=6`);
  const marineP = loc.hasMarine
    ? fetchJSON(`https://marine-api.open-meteo.com/v1/marine?latitude=${loc.lat}&longitude=${loc.lon}&current=wave_height,sea_surface_temperature&hourly=sea_level_height_msl&timezone=Europe/London&forecast_days=3`)
    : Promise.resolve(null);
  const airP = fetchJSON(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${loc.lat}&longitude=${loc.lon}&hourly=alder_pollen,birch_pollen,grass_pollen,mugwort_pollen,ragweed_pollen&domains=cams_europe&timezone=Europe/London&forecast_days=1`);

  const [weatherRes, marineRes, airRes] = await Promise.allSettled([weatherP, marineP, airP]);

  // Weather is required
  if (weatherRes.status !== "fulfilled") {
    throw new Error("Weather fetch failed: " + (weatherRes.reason?.message || "unknown"));
  }
  const weather = weatherRes.value;
  const marine = (marineRes.status === "fulfilled" && marineRes.value)
    ? marineRes.value
    : { current: {}, hourly: { time: [], sea_level_height_msl: [] } };
  const air = airRes.status === "fulfilled" ? airRes.value : { hourly: null };

  // Pick current hour's pollen values from hourly series
  let pollen = {};
  POLLEN_TYPES.forEach(k => pollen[k] = null);
  if (air.hourly?.time) {
    const nowHour = new Date();
    nowHour.setMinutes(0, 0, 0);
    const nowISO = nowHour.toISOString().slice(0, 13);
    let idx = air.hourly.time.findIndex(t => t.startsWith(nowISO));
    if (idx === -1) idx = 0;
    POLLEN_TYPES.forEach(k => {
      const arr = air.hourly[k];
      pollen[k] = arr ? arr[idx] : null;
    });
  }

  const tideSeries = (marine.hourly?.time || []).map((t, i) => ({
    t: new Date(t), h: marine.hourly.sea_level_height_msl?.[i]
  })).filter(p => p.h != null);

  const pressureHistory = [];
  if (weather.hourly?.time && weather.hourly.pressure_msl) {
    const now = Date.now();
    const cutoff = now - 4 * 60 * 60 * 1000;
    for (let i = 0; i < weather.hourly.time.length; i++) {
      const t = new Date(weather.hourly.time[i]).getTime();
      if (t >= cutoff && t <= now + 60*60*1000) {
        const v = weather.hourly.pressure_msl[i];
        if (v != null) pressureHistory.push({ t, p: v });
      }
    }
  }

  return {
    current: weather.current,
    daily: weather.daily,
    marine: marine.current || {},
    tideSeries,
    pollen,
    pressureHistory
  };
}

// --- SVG chart: tide ------------------------------------------------------
function renderTideChart(chartData, now, currentHeight) {
  if (chartData.length < 2) return "";
  const W = 400, H = 140, PAD_T = 10, PAD_B = 22, PAD_X = 8;
  const times = chartData.map(d => d.t.getTime());
  const heights = chartData.map(d => d.h);
  const tMin = Math.min(...times), tMax = Math.max(...times);
  const hMin = Math.min(...heights) - 0.2, hMax = Math.max(...heights) + 0.2;
  const x = t => PAD_X + ((t - tMin) / (tMax - tMin)) * (W - 2 * PAD_X);
  const y = h => PAD_T + (1 - (h - hMin) / (hMax - hMin)) * (H - PAD_T - PAD_B);

  const pathD = chartData.map((d, i) => `${i === 0 ? "M" : "L"}${x(d.t.getTime()).toFixed(1)},${y(d.h).toFixed(1)}`).join(" ");
  const fillD = pathD + ` L${x(tMax).toFixed(1)},${(H - PAD_B).toFixed(1)} L${x(tMin).toFixed(1)},${(H - PAD_B).toFixed(1)} Z`;

  const ticks = [];
  const stepMs = 4 * 60 * 60 * 1000;
  const firstTick = Math.ceil(tMin / stepMs) * stepMs;
  for (let t = firstTick; t <= tMax; t += stepMs) ticks.push(t);

  const nowX = x(now.getTime()).toFixed(1);
  const nowY = currentHeight != null ? y(currentHeight).toFixed(1) : null;

  return `
<svg class="tide-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
  <defs>
    <linearGradient id="tideFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="${fillD}" fill="url(#tideFill)"/>
  <path d="${pathD}" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <line x1="${nowX}" y1="${PAD_T}" x2="${nowX}" y2="${H - PAD_B}"
    stroke="#f1f5f9" stroke-dasharray="2 3" stroke-opacity="0.6"/>
  ${nowY ? `<circle cx="${nowX}" cy="${nowY}" r="4" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>` : ""}
  ${ticks.map(t => `<text x="${x(t).toFixed(1)}" y="${H - 6}" fill="#64748b" font-size="10" text-anchor="middle" font-family="system-ui">${fmtTime(new Date(t))}</text>`).join("")}
</svg>`;
}

// --- SVG chart: barometer -------------------------------------------------
function renderBaroChart(history) {
  if (!history || history.length < 2) return "";
  const W = 200, H = 48, PAD = 4;
  const times = history.map(h => h.t);
  const pressures = history.map(h => h.p);
  const tMin = Math.min(...times), tMax = Math.max(...times);
  let pMin = Math.min(...pressures), pMax = Math.max(...pressures);
  if (pMax - pMin < 2) { pMin -= 1; pMax += 1; }
  const x = t => PAD + ((t - tMin) / (tMax - tMin)) * (W - 2 * PAD);
  const y = p => PAD + (1 - (p - pMin) / (pMax - pMin)) * (H - 2 * PAD);
  const path = history.map((h, i) => `${i === 0 ? "M" : "L"}${x(h.t).toFixed(1)},${y(h.p).toFixed(1)}`).join(" ");
  return `
<svg class="baro-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
  <path d="${path}" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;
}

// --- Sun bar --------------------------------------------------------------
function renderSunBar(sunrise, sunset, now) {
  const n = now.getTime();
  const dayStart = new Date(now); dayStart.setHours(0, 0, 0, 0);
  const dayEnd = new Date(now); dayEnd.setHours(24, 0, 0, 0);
  const ds = dayStart.getTime(), de = dayEnd.getTime();
  const pct = t => ((t - ds) / (de - ds)) * 100;
  const sunPct = Math.max(0, Math.min(100, pct(n)));
  const daylightStart = pct(sunrise.getTime());
  const daylightWidth = pct(sunset.getTime()) - daylightStart;
  return `
<div class="sun-bar">
  <div class="sun-track">
    <div class="sun-daylight" style="left:${daylightStart}%; width:${daylightWidth}%"></div>
  </div>
  <div class="sun-dot" style="left:${sunPct}%"></div>
</div>
<div class="sun-times">
  <span>00:00</span>
  <span class="mid">↑ ${fmtTime(sunrise)}</span>
  <span class="mid">${fmtTime(sunset)} ↓</span>
  <span>24:00</span>
</div>`;
}

// --- Moon phase SVG ------------------------------------------------------
// phase: 0 = new moon, 0.25 = first quarter (right half lit, waxing),
//        0.5 = full, 0.75 = last quarter (left half lit, waning), 1 = new.
function renderMoon(phase, size = 64) {
  const r = size / 2 - 2;
  const cx = size / 2, cy = size / 2;

  // Illumination fraction (0..1) — 0 at new, 1 at full
  const illum = (1 - Math.cos(2 * Math.PI * phase)) / 2;

  // New moon: show dark disk
  if (illum < 0.02) {
    return `
<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="#1e293b" stroke="#334155" stroke-width="1"/>
</svg>`;
  }
  // Full moon: show lit disk
  if (illum > 0.98) {
    return `
<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="#f1f5f9" stroke="#334155" stroke-width="1"/>
</svg>`;
  }

  const waxing = phase < 0.5;
  // Terminator ellipse x-radius:
  //   crescent (illum < 0.5): tRx > 0, ellipse curves INWARD from the limb
  //   gibbous  (illum > 0.5): tRx > 0, ellipse curves OUTWARD
  // We use the same value for radius; it's the sweep direction that flips.
  const tRx = r * Math.abs(Math.cos(Math.PI * illum));

  // Build the illuminated-region path.
  // Start at top of circle, arc down outer limb, then arc back across terminator.
  //
  // WAXING (lit on right): outer arc goes right-side (sweep=1).
  // WANING (lit on left):  outer arc goes left-side (sweep=0).
  //
  // For the terminator half-ellipse:
  //   crescent: terminator bulges AWAY from lit side → sweep = opposite of outer
  //   gibbous:  terminator bulges TOWARD lit side → sweep = same as outer
  const outerSweep = waxing ? 1 : 0;
  const crescent = illum < 0.5;
  const innerSweep = crescent
    ? (waxing ? 0 : 1)   // opposite of outer
    : (waxing ? 1 : 0);  // same as outer

  const topX = cx, topY = cy - r;
  const botX = cx, botY = cy + r;

  const litPath = `M ${topX} ${topY}
    A ${r} ${r} 0 0 ${outerSweep} ${botX} ${botY}
    A ${tRx} ${r} 0 0 ${innerSweep} ${topX} ${topY} Z`;

  return `
<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <path d="${litPath}" fill="#f1f5f9"/>
</svg>`;
}

      <div class="compass">
        <div class="compass-ring"></div>
        <div class="compass-n">N</div>
        <div class="compass-arrow" style="transform:rotate(${windDir != null ? windDir + 180 : 0}deg); color:${sColor}">${ICONS.arrowUp}</div>
      </div>
      <div>
        <div class="meta-title">Wind</div>
        <div class="val">${Math.round(current.wind_speed_10m)} km/h <span style="color:var(--muted)">${windDirLabel}</span></div>
      </div>
    </div>
    <div class="meta">
      ${ICONS.droplet}
      <div>
        <div class="meta-title">Humidity</div>
        <div class="val">${Math.round(current.relative_humidity_2m)}%</div>
      </div>
    </div>
  </div>
</div>

<!-- Sun -->
<div class="card">
  <div class="label">${ICONS.sunIcon}<span>Daylight</span><span class="right">${sunMsg}</span></div>
  ${renderSunBar(sunrise, sunset, now)}
</div>

<!-- Activity (boat or horse) -->
${loc.activity === "horse" ? `
<div class="card">
  <div class="label">${ICONS.horse}<span>Horse riding day</span></div>
  <div class="verdict-row">
    <div class="verdict-icon" style="background:${horse.color}22; color:${horse.color}">${ICONS[horse.icon]}</div>
    <div class="verdict-text">
      <div class="verdict-main" style="color:${horse.color}">${horse.verdict}</div>
      <div class="verdict-sub">${horse.sub}</div>
    </div>
  </div>
</div>
` : `
<div class="card">
  <div class="label">${ICONS.anchor}<span>Boat day</span></div>
  <div class="verdict-row">
    <div class="verdict-icon" style="background:${boat.color}22; color:${boat.color}">${ICONS[boat.icon]}</div>
    <div class="verdict-text">
      <div class="verdict-main" style="color:${boat.color}">${boat.verdict}</div>
      <div class="verdict-sub">${boat.sub}</div>
    </div>
  </div>
  <div class="meta-grid">
    <div class="meta">
      ${ICONS.wavesSm}
      <div>
        <div class="meta-title">Wave height</div>
        <div class="val">${waveHeight != null ? waveHeight.toFixed(2) + " m" : "—"}</div>
      </div>
    </div>
    <div class="meta">
      ${ICONS.thermometer}
      <div>
        <div class="meta-title">Sea temp</div>
        <div class="val">${seaTemp != null ? seaTemp.toFixed(1) + "°C" : "—"}</div>
      </div>
    </div>
  </div>
</div>
`}

<!-- Barometer -->
<div class="card">
  <div class="label">${ICONS.gauge}<span>Barometer</span><span class="right" style="color:${trend.color}">${trend.symbol} ${trend.label}</span></div>
  <div class="row" style="margin-bottom:8px">
    <div>
      <div class="big">${pressure != null ? Math.round(pressure) : "—"}<span class="unit">hPa</span></div>
      <div class="caption">Last 6 hours</div>
    </div>
  </div>
  ${renderBaroChart(pressureHistory)}
</div>

<!-- Stargazing -->
<div class="card">
  <div class="label">${ICONS.star}<span>Stargazing</span><span class="right">${nightTime ? "Dark now" : "Daytime"}</span></div>
  <div class="stars-row">
    <div class="moon-viz">${renderMoon(phase, 64)}</div>
    <div class="score-wrap">
      <div>
        <span class="score" style="color:${starsCol}">${stars}</span>
        <span class="score-slash">/ 10</span>
      </div>
      <div class="score-sub">${phaseName} · ${Math.round(illum * 100)}% lit</div>
    </div>
  </div>
  <div class="score-bar"><div style="width:${stars * 10}%; background:${starsCol}"></div></div>
  <div class="score-legend"><span>Can't see a thing</span><span>Milky Way</span></div>
  <div class="stars-meta" style="margin-top:10px">${Math.round(current.cloud_cover)}% cloud cover${!nightTime ? " · too light to see stars now" : ""}</div>
</div>

<!-- Pollen -->
<div class="card">
  <div class="label">${ICONS.flower}<span>Pollen</span>${allPollenNull ? '<span class="right">No data for this location</span>' : ''}</div>
  ${allPollenNull ? `
    <div class="stars-meta" style="margin-top:0">Pollen forecasts from CAMS don't always cover UK coastal points. Check the Met Office forecast instead.</div>
  ` : `
    <div class="pollen-grid">
      ${[["Grass", grass], ["Tree", tree], ["Weed", weed]].map(([name, lvl]) => `
        <div class="pollen">
          <div class="p-label">${name}</div>
          <div class="p-val" style="color:${lvl.color}">${lvl.label}</div>
          <div class="bars">${[1,2,3,4].map(i => `<span style="background:${i <= lvl.score ? lvl.color : 'var(--border)'}"></span>`).join("")}</div>
        </div>`).join("")}
    </div>
  `}
</div>

<p class="footnote">Data: Open-Meteo. Tides modelled at ~8 km resolution — not for navigation.<br>v3.0 · ${new Date().toLocaleDateString("en-GB")}</p>`;
}

// --- Wire up --------------------------------------------------------------
window.__reload = async function() {
  state.refreshing = true; render();
  try {
    state.data = await loadAll(currentLoc());
    state.error = null;
  } catch (e) {
    console.error(e);
    state.error = "Couldn't load data. Check your connection.";
  }
  state.loading = false;
  state.refreshing = false;
  state.now = new Date();
  render();
};

setInterval(() => { if (state.data) { state.now = new Date(); render(); } }, 30000);
setInterval(() => window.__reload(), REFRESH_MS);
document.addEventListener("visibilitychange", () => { if (!document.hidden) window.__reload(); });

window.__reload();
</script>

</body>
</html>
